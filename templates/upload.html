{% extends "base.html" %}
{% block content %}
<h2>Загрузить картинку</h2>
<p>Картинка автоматически привяжется к вашему профилю.</p>
<p>Первая загруженная картинка станет вашим аватаром.</p>

<form method="POST" enctype="multipart/form-data">
    {{ form.hidden_tag() }}
    <p>
        {{ form.image() }}
    </p>
    <p>{{ form.submit() }}</p>
</form>
{% endblock %}
